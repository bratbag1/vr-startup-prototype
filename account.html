<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaVerse VR | Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <nav>
    <div class="logo">NovaVerse VR</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="products.html">Products</a>
      <a href="experiences.html">Experiences</a>
      <a href="pricing.html">Pricing</a>
      <a href="account.html">Login</a>
    </div>
  </nav>
</header>
<main>
  <h2 class="section-title">Login / Create Account</h2>
  <p class="section-intro">This page includes login, password, and account creation features.</p>
  <div class="form-wrapper">
    <form>
      <h3>Login</h3>
      <label>Email</label>
      <input type="email" placeholder="name@example.com" />
      <label>Password</label>
      <input type="password" placeholder="Enter password" />
      <button class="form-button" type="button">Login</button>
    </form>
    <form>
      <h3>Create Account</h3>
      <label>Full Name</label>
      <input type="text" placeholder="Full Name" />
      <label>Email</label>
      <input type="email" placeholder="name@example.com" />
      <label>Password</label>
      <input type="password" placeholder="Create password" />
      <label>Primary Interest</label>
      <select>
        <option>VR Gaming</option>
        <option>VR Training</option>
        <option>Enterprise Collaboration</option>
      </select>
      <button class="form-button" type="button">Create Account</button>
    </form>
  </div>
</main>
<footer>
  <p>NovaVerse VR Prototype | Academic Mockup Website | Lorem Ipsum Placeholder Content</p>
</footer>
</body>
</html>
